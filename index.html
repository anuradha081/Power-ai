<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Grid Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
body{
    font-family: Arial;
    background:#eef2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    text-align:center;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    width:420px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
    margin:auto;
}

input,button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    background:#1f6feb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#alertBox{
    margin-top:15px;
    padding:10px;
    border-radius:6px;
    font-weight:bold;
}

canvas{
    margin-top:20px;
}
</style>
</head>

<body>

<h2>⚡ AI Smart Grid Loss Detection Dashboard</h2>

<div class="card">

<input id="power" placeholder="Power Sent">
<input id="temp" placeholder="Temperature">
<input id="length" placeholder="Line Length">
<input id="load" placeholder="Transformer Load">
<input id="actual" placeholder="Actual Loss">

<button onclick="send()">Predict</button>

<div id="alertBox"></div>

<canvas id="chart"></canvas>

</div>

<script>
let chart;

function send(){

    fetch("/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            power_sent:power.value,
            temperature:temp.value,
            line_length:length.value,
            load:load.value,
            actual_loss:actual.value
        })
    })
    .then(res=>res.json())
    .then(data=>{

        // ===== Colored alert =====
        let box=document.getElementById("alertBox");
        box.innerHTML="Predicted Loss: "+data.predicted_loss+"<br>"+data.status;

        if(data.status.includes("⚠️")){
            box.style.background="#ffe5e5";
            box.style.color="#b30000";
        }else{
            box.style.background="#e6ffea";
            box.style.color="#006622";
        }

        // ===== Chart =====
        let ctx=document.getElementById("chart").getContext("2d");

        if(chart) chart.destroy();

        chart=new Chart(ctx,{
            type:'bar',
            data:{
                labels:['Actual Loss','Predicted Loss'],
                datasets:[{
                    label:'Power Loss Comparison',
                    data:[actual.value, data.predicted_loss]
                }]
            },
            options:{
                responsive:true,
                scales:{
                    y:{beginAtZero:true}
                }
            }
        });

    });
}
</script>

</body>
</html>
